name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        solution:
          - generated/ArithmeticOperations/ArithmeticOperations.sln
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ matrix.solution }}

      - name: Build
        run: dotnet build ${{ matrix.solution }} --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Test with coverage
        continue-on-error: true
        run: >
          dotnet test ${{ matrix.solution }}
          --no-build
          --configuration Release
          --logger "trx;LogFileName=results.trx"
          --collect:"XPlat Code Coverage"

      - name: Test Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/results.trx'
          reporter: dotnet-trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  cve-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        solution:
          - generated/ArithmeticOperations/ArithmeticOperations.sln
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ matrix.solution }}

      - name: Check for vulnerable packages
        run: |
          output=$(dotnet list ${{ matrix.solution }} package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected"
            exit 1
          fi

  codeql:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        solution:
          - generated/ArithmeticOperations/ArithmeticOperations.sln
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build
        run: dotnet build ${{ matrix.solution }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
