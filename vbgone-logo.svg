<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5A00D"/>
      <stop offset="100%" stop-color="#CC7B19"/>
    </linearGradient>
  </defs>

  <rect width="400" height="120" rx="16" fill="url(#bg)"/>

  <rect x="0" y="110" width="400" height="10" rx="0" fill="url(#accent)" opacity="0.8"/>
  <rect x="0" y="110" width="400" height="10" rx="0 0 16 16" fill="url(#accent)" opacity="0.8"/>

  <!-- VB strikethrough -->
  <text x="30" y="78" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#666">
    VB
  </text>
  <line x1="26" y1="62" x2="100" y2="62" stroke="#E5A00D" stroke-width="4" stroke-linecap="round"/>

  <!-- Arrow -->
  <text x="110" y="76" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" fill="#555">
    →
  </text>

  <!-- C# -->
  <text x="148" y="78" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#E5A00D">
    C#
  </text>

  <!-- VBGone text -->
  <text x="240" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="18" fill="#999" letter-spacing="4">
    VBGONE
  </text>

  <!-- Tagline -->
  <text x="240" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="13" fill="#666">
    AI-assisted migration
  </text>
</svg>
